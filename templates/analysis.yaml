{{- if .Values.rollout.canary.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "service-chart.name" . }}-success-rate
  namespace: argo-rollouts
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(nginx_http_requests_total{service="{{`{{ args.service-name }}`}}",status!~"5.."}[2m]))
            /
            sum(rate(nginx_http_requests_total{service="{{`{{ args.service-name }}`}}"}[2m]))
{{- end -}}