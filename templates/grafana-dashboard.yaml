{{- if .Values.grafanaDashboard.enabled -}}
{{- if empty .Values.grafanaDashboard.instanceSelector.matchLabels -}}
{{- fail "grafanaDashboard.instanceSelector.matchLabels must be set when grafanaDashboard.enabled=true" -}}
{{- end }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ include "service-chart.name" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "service-chart.selectorLabels" . | nindent 4 }}
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  instanceSelector:
    matchLabels:
      {{- toYaml .Values.grafanaDashboard.instanceSelector.matchLabels | nindent 6 }}
  {{- with .Values.grafanaDashboard.folder }}
  folder: {{ . | quote }}
  {{- end }}
  json: |
{{ .Files.Get "dashboard.json" | indent 4 }}
{{- end }}
