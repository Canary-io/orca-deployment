{{- if .Values.rollout.canary.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "service-chart.name" . }}
  namespace: argo-rollouts

spec:
  replicas: 4

  selector:
    matchLabels:
      app: {{ include "service-chart.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "service-chart.name" . }}
    spec:
      {{- if .Values.image.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.imagePullSecret }}
      {{- end }}

      containers:
        - name: {{ include "service-chart.name" . }}
          image: "{{ include "service-chart.image" . }}"
          ports:
            - name: http
              containerPort: 8080

        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: proxy
              containerPort: 8081
            - name: nginx-status
              containerPort: 9113
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d

        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - --nginx.scrape-uri=http://127.0.0.1:9113/stub_status
            - --web.listen-address=:9114
          ports:
            - name: metrics
              containerPort: 9114

      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "service-chart.name" . }}-nginx-config

  strategy:
    canary:
      canaryService: {{ include "service-chart.name" . }}-canary
      stableService: {{ include "service-chart.name" . }}-stable

      trafficRouting:
        nginx:
          stableIngress: {{ include "service-chart.name" . }}-ingress
          {{- with .Values.rollout.canary.nginx.annotationPrefix }}
          annotationPrefix: {{ . | quote }}
          {{- end }}
          {{- with .Values.rollout.canary.nginx.additionalIngressAnnotations }}
          additionalIngressAnnotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.rollout.canary.nginx.canaryIngressAnnotations }}
          canaryIngressAnnotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      steps:
        {{- $steps := .Values.rollout.canary.steps }}
        {{- range $i, $w := $steps }}
          - setWeight: {{ $w }}
          {{- if and $.Values.rollout.canary.analysis.enabled (ne $i (sub (len $steps) 1)) }}
          - analysis:
              templates:
                - templateName: {{ include "service-chart.name" $ }}-success-rate
              args:
                - name: service-name
                  value: {{ include "service-chart.canaryServiceName" $ }}
          - pause: {}
          {{- else if ne $i (sub (len $steps) 1) }}
          - pause: {}
          {{- end }}
        {{- end }}
{{- end}}

---

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "service-chart.name" . }}
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - argo-rollouts
  selector:
    matchLabels:
      app: {{ include "service-chart.name" . }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
