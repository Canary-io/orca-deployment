{{- if and (not .Values.rollout.canary.enabled) (not .Values.rollout.bluegreen.enabled) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "service-chart.name" . }}
  namespace: argo-rollouts
  labels:
    {{- include "service-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "service-chart.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "service-chart.name" . }}
    spec:
      {{- if .Values.image.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.imagePullSecret }}
      {{- end }}
      containers:
        - name: {{ include "service-chart.name" . }}
          image: "{{ include "service-chart.image" . }}"
          ports:
            - name: http
              containerPort: 8080
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: proxy
              containerPort: 8081
            - name: nginx-status
              containerPort: 9113
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3.0
          args:
            - --nginx.scrape-uri=http://127.0.0.1:9113/stub_status
            - --web.listen-address=:9114
          ports:
            - name: metrics
              containerPort: 9114
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "service-chart.name" . }}-nginx-config
{{- end }}
