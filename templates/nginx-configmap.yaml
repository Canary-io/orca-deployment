apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-chart.name" . }}-nginx-config
  namespace: argo-rollouts
data:
  default.conf: |
    server {
      listen 8081;
      location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }

    server {
      listen 9113;
      location /stub_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        deny all;
      }
    }
