apiVersion: batch/v1
kind: Job
metadata:
  name: dashboard-import
  namespace: monitoring
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -sS -X POST "http://prometheus-grafana.monitoring.svc.cluster.local/api/dashboards/db" \
                -H "Content-Type: application/json" \
                -u "$GRAFANA_USER:$GRAFANA_PASSWORD" \
                --data-binary @/dashboard/dashboard.json
          env:
            - name: GRAFANA_USER
              value: admin
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prometheus-grafana
                  key: admin-password
          volumeMounts:
            - name: dashboard
              mountPath: /dashboard
      volumes:
        - name: dashboard
          configMap:
            name: dashboard-json
