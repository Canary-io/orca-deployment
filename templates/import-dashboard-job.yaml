{{- if .Values.grafanaImportJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "service-chart.name" . }}-dashboard-import
  namespace: {{ .Values.grafanaImportJob.namespace }}
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: importer
          image: curlimages/curl:8.7.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -sS -X POST "{{ .Values.grafanaImportJob.grafanaUrl }}/api/dashboards/db" \
                -H "Content-Type: application/json" \
                -u "$GRAFANA_USER:$GRAFANA_PASSWORD" \
                --data-binary @/dashboard/dashboard.json
          env:
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafanaImportJob.credentialsSecret.name }}
                  key: {{ .Values.grafanaImportJob.credentialsSecret.usernameKey }}
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafanaImportJob.credentialsSecret.name }}
                  key: {{ .Values.grafanaImportJob.credentialsSecret.passwordKey }}
          volumeMounts:
            - name: dashboard
              mountPath: /dashboard
      volumes:
        - name: dashboard
          configMap:
            name: {{ include "service-chart.name" . }}-dashboard-json
{{- end }}
