{{- if .Values.rollout.bluegreen.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-chart.name" . }}-active
  namespace: argo-rollouts
spec:
  type: ClusterIP
  selector:
    app: {{ include "service-chart.name" . }}
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 8080
      targetPort: 8080
{{- end }}
