{{- $releaseName := include "service-chart.name" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-chart.name" . }}-dashboard-json
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "uid": "{{ include "service-chart.grafanaDashboardUid" . }}",
        "title": "{{ .Values.image.name }} Metrics",
        "tags": ["canary", "argo-rollouts", "nginx"],
        "timezone": "browser",
        "schemaVersion": 36,
        "version": 0,
        "refresh": "30s",
        "panels": [
          {
            "id": 1,
            "title": "Healthy NGINX Targets",
            "type": "stat",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum(nginx_up{job=\"monitoring/{{ $releaseName }}\"})",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 }
          },
          {
            "id": 2,
            "title": "Request Rate",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum(rate(nginx_http_requests_total{job=\"monitoring/{{ $releaseName }}\"}[2m]))",
                "legendFormat": "requests/sec",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 }
          },
          {
            "id": 3,
            "title": "Requests by Pod",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum by (pod) (rate(nginx_http_requests_total{job=\"monitoring/{{ $releaseName }}\"}[2m]))",
                "legendFormat": "{{`{{pod}}`}}",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 }
          },
          {
            "id": 4,
            "title": "Active Connections by Pod",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum by (pod) (nginx_connections_active{job=\"monitoring/{{ $releaseName }}\"})",
                "legendFormat": "{{`{{pod}}`}}",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 }
          },
          {
            "id": 5,
            "title": "Ready Pods",
            "type": "stat",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum(max by (pod) (kube_pod_status_ready{namespace=\"argo-rollouts\",pod=~\"{{ $releaseName }}-.*\",condition=\"true\"}))",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 6, "x": 0, "y": 16 }
          },
          {
            "id": 6,
            "title": "Container Restarts",
            "type": "stat",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"argo-rollouts\",pod=~\"{{ $releaseName }}-.*\"})",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 6, "x": 6, "y": 16 }
          },
          {
            "id": 7,
            "title": "Memory Working Set by Pod",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"argo-rollouts\",pod=~\"{{ $releaseName }}-.*\"})",
                "legendFormat": "{{`{{pod}}`}}",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 }
          },
          {
            "id": 8,
            "title": "CPU Usage by Pod",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"argo-rollouts\",pod=~\"{{ $releaseName }}-.*\"}[2m]))",
                "legendFormat": "{{`{{pod}}`}}",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 }
          },
          {
            "id": 9,
            "title": "Scrape Health by Pod",
            "type": "timeseries",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "targets": [
              {
                "expr": "up{job=\"monitoring/{{ $releaseName }}\"}",
                "legendFormat": "{{`{{pod}}`}}",
                "refId": "A"
              }
            ],
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 }
          }
        ]
      },
      "overwrite": true
    }
