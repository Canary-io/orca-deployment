name: Publish Helm Chart

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish-chart:
    runs-on: ubuntu-latest

    env:
      CHART_DIR: .
      REGISTRY: ghcr.io
      REGISTRY_REPOSITORY: ghcr.io/josephjophy/charts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Package chart
        run: helm package "${CHART_DIR}" --destination packaged-chart

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | helm registry login "${REGISTRY}" --username "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Push chart to registry
        run: helm push packaged-chart/*.tgz "oci://${REGISTRY_REPOSITORY}"
